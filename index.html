<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tissue Tournament Bracket</title>

<style>
body{font-family:Arial,sans-serif;background:#f8fafc;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.1);margin-bottom:16px}
button{padding:10px 14px;border-radius:10px;border:1px solid #ccc;font-weight:bold;cursor:pointer}
button.primary{background:#e0e7ff}
button.good{background:#dcfce7}
button:disabled{opacity:.5}
.choice{border:1px solid #ccc;border-radius:12px;padding:12px;cursor:pointer}
.choice.selected{outline:3px solid #f59e0b}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hidden{display:none}
textarea,input{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc}
.toast{position:fixed;bottom:20px;right:20px;background:#047857;color:#fff;padding:10px 14px;border-radius:10px;font-weight:bold}
</style>
</head>

<body>
<div class="container">

<div class="card" id="start">
  <h2>Start</h2>
  <label>Name (required)</label>
  <input id="studentName">
  <br><br>
  <button id="begin" class="primary">Begin Bracket</button>
</div>

<div class="card hidden" id="match"></div>

<div class="card hidden" id="results">
  <h2>Champion Tissue</h2>
  <p id="champ"></p>
  <button>Download Your Bracket</button>
  <button>Download Your Explanations</button>
  <button>Download Your Results (Bracket + Explanations)</button>
</div>

</div>

<script>
const tissues=[
"Simple squamous epithelium","Simple cuboidal epithelium",
"Simple columnar epithelium","Stratified squamous epithelium",
"Areolar connective tissue","Adipose connective tissue",
"Dense connective tissue","Bone","Blood","Cartilage",
"Skeletal muscle","Cardiac muscle","Smooth muscle",
"Nervous tissue","Elastic cartilage","Hyaline cartilage"
];

let index=0;
let picks=[];

function toast(msg){
  const t=document.createElement('div');
  t.className='toast';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

function countWords(t){
  return t.trim().split(/\s+/).filter(Boolean).length;
}

function renderMatch(){
  if(index >= tissues.length-1){
    finish();
    return;
  }

  const a=tissues[index];
  const b=tissues[index+1];
  const card=document.getElementById('match');

  card.innerHTML=`
    <h3>Decision ${picks.length+1}</h3>
    <div class="choices">
      <div class="choice" data="A">${a}</div>
      <div class="choice" data="B">${b}</div>
    </div>
    <label>Explanation (minimum 10 words)</label>
    <textarea id="exp"></textarea>
    <p id="wc">Word count: 0 / 10</p>
    <button id="submit" class="good" disabled>Submit Decision & Continue</button>
  `;

  let selected=null;
  const exp=document.getElementById('exp');
  const btn=document.getElementById('submit');

  card.querySelectorAll('.choice').forEach(c=>{
    c.onclick=()=>{
      card.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected'));
      c.classList.add('selected');
      selected=c.dataset;
      update();
    };
  });

  exp.oninput=update;

  function update(){
    const wc=countWords(exp.value);
    document.getElementById('wc').textContent=`Word count: ${wc} / 10`;
    btn.disabled=!(selected && wc>=10);
  }

  btn.onclick=()=>{
    picks.push({winner:selected==="A"?a:b});
    toast("Decision submitted.");
    index+=2;
    renderMatch();
  };
}

function finish(){
  document.getElementById('match').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');
  document.getElementById('champ').textContent=picks[picks.length-1].winner;
}

document.getElementById('begin').onclick=()=>{
  const name=document.getElementById('studentName').value.trim();
  if(!name){alert("Please enter your name");return;}
  document.getElementById('start').classList.add('hidden');
  const m=document.getElementById('match');
  m.classList.remove('hidden');
  renderMatch();
};
</script>
</body>
</html>
