<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tissue Tournament Bracket</title>

<!-- Export libraries -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
/* =======================
   CORE THEME
======================= */
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#111827;
  --muted:#374151;
  --accent:#1d4ed8;
  --accent2:#047857;
  --danger:#b91c1c;
  --border:rgba(17,24,39,.18);
  --shadow: 0 10px 30px rgba(17,24,39,.08);
  --radius:18px;
  --focus: 0 0 0 3px rgba(29,78,216,.25);
  --soft:#eef2ff;
  --selectedFill: rgba(245,158,11,.18);
  --selectedBorder: rgba(245,158,11,.85);
}

body{
  margin:0;
  font-family: system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.hidden{ display:none !important; }

/* =======================
   WINNER MODAL
======================= */
#winnerModal{
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: grid;
  place-items: center;
}

#winnerModal .backdrop{
  position:absolute;
  inset:0;
  background: rgba(17,24,39,0.65);
}

#winnerModal .modal{
  position:relative;
  background:#fff;
  padding:30px 34px;
  border-radius:22px;
  max-width:520px;
  width:calc(100% - 40px);
  box-shadow:0 30px 80px rgba(0,0,0,.35);
  text-align:center;
}

#winnerModal h2{
  margin:0 0 10px;
  font-size:2rem;
  font-weight:900;
  color:#065f46;
}

#winnerModal p{
  margin:0 0 20px;
  color:#374151;
}

#winnerModal button{
  font-size:1.05rem;
  padding:12px 16px;
  border-radius:14px;
  border:1px solid rgba(4,120,87,.45);
  background:rgba(4,120,87,.15);
  color:#065f46;
  font-weight:900;
  cursor:pointer;
}

/* =======================
   CONFETTI
======================= */
#confettiCanvas{
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
}

/* =======================
   BUTTONS / UTIL
======================= */
button{
  border-radius:14px;
  border:1px solid var(--border);
  background:#fff;
  padding:10px 12px;
  font-weight:800;
  cursor:pointer;
}

button.good{
  background:rgba(4,120,87,.12);
  border-color:rgba(4,120,87,.45);
  color:#065f46;
}
</style>
</head>

<body>

<!-- CONFETTI CANVAS -->
<canvas id="confettiCanvas"></canvas>

<!-- WINNER MODAL -->
<div id="winnerModal" class="hidden" role="dialog" aria-modal="true">
  <div class="backdrop"></div>
  <div class="modal">
    <h2 id="winnerText">The Winner is…</h2>
    <p>
      You’ve completed your Tissue Tournament Bracket.<br>
      To finish, download your results.
    </p>
    <button id="downloadAllBtn" class="good">
      Download Results (Bracket + Explanations)
    </button>
  </div>
</div>

<script>
/* ==========================================================
   CONFETTI ANIMATION (NO LIBRARIES)
========================================================== */
const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");
let confettiPieces = [];
let confettiActive = false;

function resizeConfetti(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeConfetti);
resizeConfetti();

function launchConfetti(){
  confettiActive = true;
  confettiPieces = Array.from({length: 180}).map(() => ({
    x: Math.random()*canvas.width,
    y: Math.random()*-canvas.height,
    r: Math.random()*6+4,
    d: Math.random()*canvas.height,
    color: `hsl(${Math.random()*360},90%,60%)`,
    tilt: Math.random()*10,
    tiltSpeed: Math.random()*0.1+0.05
  }));
  requestAnimationFrame(drawConfetti);
  setTimeout(() => confettiActive = false, 6000);
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiPieces.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle=p.color;
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y += Math.cos(p.d)*2+5;
    p.x += Math.sin(p.tilt);
  });
  if(confettiActive) requestAnimationFrame(drawConfetti);
}

/* ==========================================================
   PDF EXPORT (COMBINED ONLY)
========================================================== */
async function exportPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ format:"letter", unit:"pt" });

  const bracket = document.getElementById("exportBracketPage");
  const explanations = document.getElementById("exportExplanationPage");

  async function add(node, newPage){
    const canvas = await html2canvas(node, {scale:2, backgroundColor:"#fff"});
    const w = pdf.internal.pageSize.getWidth()-72;
    const h = pdf.internal.pageSize.getHeight()-72;
    const ratio = Math.min(w/canvas.width, h/canvas.height);
    if(newPage) pdf.addPage();
    pdf.addImage(canvas, "PNG", 36, 36, canvas.width*ratio, canvas.height*ratio);
  }

  await add(bracket, false);
  await add(explanations, true);

  pdf.save("tissue_tournament_bracket_and_explanations.pdf");
}

/* ==========================================================
   FORCE DOWNLOAD TO CLOSE MODAL
========================================================== */
document.getElementById("downloadAllBtn").addEventListener("click", async ()=>{
  await exportPDF();
  document.getElementById("winnerModal").classList.add("hidden");
});

/* ==========================================================
   DEMO TRIGGER (REPLACE WITH YOUR INTERNAL CALL)
   This simulates the end-of-bracket event
========================================================== */
setTimeout(()=>{
  // 🎯 This block should be called INSIDE showResults()
  document.getElementById("winnerText").textContent =
    "The Winner is… Nervous tissue!";
  document.getElementById("winnerModal").classList.remove("hidden");
  launchConfetti();
},1000);
</script>

</body>
</html>
